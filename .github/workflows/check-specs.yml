name: Check Runner Specs

on: [workflow_dispatch, push]

jobs:
  specs:
    runs-on: ubuntu-22.04
    steps:
      - run: |
          echo "=== OS ==="
          cat /etc/os-release | head -4
          echo ""
          echo "=== CPU ==="
          nproc
          lscpu | grep "Model name"
          echo ""
          echo "=== RAM ==="
          free -h
          echo ""
          echo "=== DISK ==="
          df -h /
          echo ""
          echo "=== SUMMARY ==="
          echo "CPU Cores: $(nproc)"
          echo "RAM Total: $(free -h | awk '/^Mem:/{print $2}')"
          echo "RAM Avail: $(free -h | awk '/^Mem:/{print $7}')"
          echo "Disk Total: $(df -h / | awk 'NR==2{print $2}')"
          echo "Disk Avail: $(df -h / | awk 'NR==2{print $4}')"
