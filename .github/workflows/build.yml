name: Build AOSP Module

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Module to build'
        type: choice
        required: true
        default: SystemUI
        options:
          - SystemUI
          - TrebuchetQuickStep
          - Settings
          - selinux_policy
          - bacon
          - org.lineageos.platform SystemUI LineageParts LineageSettingsProvider
      release:
        description: 'Create GitHub Release'
        type: boolean
        required: true
        default: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Free up disk
        run: |
          echo "Listing disk space before cleanup:"
          df -h
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/local/.ghcup \
            /usr/local/julia* \
            /usr/local/aws-cli \
            /usr/local/aws-sam-cli \
            /usr/local/n \
            /usr/local/sqlpackage \
            /usr/local/share/chromium \
            /usr/local/share/powershell \
            /usr/share/dotnet \
            /usr/share/swift \
            /usr/share/miniconda \
            /usr/share/az_* \
            /usr/share/sbt \
            /usr/share/gradle* \
            /usr/share/kotlinc \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/PyPy \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/node \
            /opt/hostedtoolcache/Python \
            /opt/az \
            /opt/microsoft \
            /opt/google \
            /opt/pipx \
            /usr/lib/google-cloud-sdk \
            /usr/lib/heroku \
            /usr/lib/firefox \
            /usr/lib/mono \
            /usr/lib/llvm-1* \
            /home/linuxbrew

          rm -rf /home/runner/.rustup /home/runner/.cargo
          npm cache clean --force
          rm -rf /home/runner/.npm/_cacache
          docker system prune -af --volumes 2>/dev/null || true
          sudo rm -rf /var/lib/gems /usr/local/lib/node_modules
          
          echo "Listing disk space after cleanup:"
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git git-lfs gnupg gperf imagemagick protobuf-compiler python3-protobuf \
            lib32readline-dev lib32z1-dev libdw-dev libelf-dev libgnutls28-dev lz4 \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync \
            schedtool squashfs-tools xsltproc xxd zip zlib1g-dev \
            lib32ncurses5-dev libncurses5 libncurses5-dev
          sudo apt-get install -y -qq python-is-python3
          sudo apt-get clean -qq

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ccache-lineage-17.1-${{ github.run_id }}
          restore-keys: |
            ccache-lineage-17.1-

      - name: Setup ccache
        run: |
          mkdir -p ~/.ccache
          ccache -M 5G
          ccache -o compression=true
          ccache -z
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV
          echo "CCACHE_EXEC=$(command -v ccache)" >> $GITHUB_ENV
          echo "CCACHE_COMPRESS=1" >> $GITHUB_ENV

      - name: Install repo
        run: |
          sudo wget -q https://storage.googleapis.com/git-repo-downloads/repo -O /usr/local/bin/repo
          sudo chmod a+x /usr/local/bin/repo
          repo --version

      - name: Git config
        run: |
          git config --global user.name "ci"
          git config --global user.email "ci@ci.com"
          git lfs install
          git config --global trailer.changeid.key "Change-Id"

      - name: Repo init
        run: |
          repo init --depth=1 -u https://github.com/LineageOS/android.git -b lineage-17.1
          mkdir -p .repo/local_manifests
          mv device.xml .repo/local_manifests
          # git clone --depth=1 https://github.com/bimuafaq/local_manifests .repo/local_manifests

      - name: Repo sync and apply patches
        run: |
          repo sync --force-sync -c --no-tags --optimized-fetch --prune -j$(nproc)
          df -h
          sed -i '/permissive domains not allowed in user builds/,/fi/{/exit 1/d}' system/sepolicy/Android.mk
          rm -rf .repo
          df -h

      - name: Setup vendor keys
        env:
          VENDOR_KEYS: ${{ secrets.VENDOR_KEYS }}
        run: |
          echo "$VENDOR_KEYS" | base64 -d > vendor_keys.zip
          unzip -o vendor_keys.zip
          rm -f vendor_keys.zip
          export OWN_KEYS_DIR="$PWD/vendor_keys"
          sudo ln -sf "$OWN_KEYS_DIR/releasekey.pk8" "$OWN_KEYS_DIR/testkey.pk8"
          sudo ln -sf "$OWN_KEYS_DIR/releasekey.x509.pem" "$OWN_KEYS_DIR/testkey.x509.pem"
          echo "OWN_KEYS_DIR=$OWN_KEYS_DIR" >> $GITHUB_ENV

      - name: Build
        timeout-minutes: 240
        continue-on-error: true
        env:
          TARGET: ${{ inputs.target }}
          NINJA_HIGHMEM_NUM_JOBS: 1
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          source build/envsetup.sh
          lunch lineage_RMX2185-user
          make $TARGET -j$(nproc) 2>&1 | tee /tmp/build.log &
          BUILD_PID=$!
          START_TS=$(date +%s)
          LAST_PCT=""
          MSG_ID=""
          while kill -0 $BUILD_PID 2>/dev/null; do
            sleep 60
            LINE=$(tail -100 /tmp/build.log | grep -oP '\[\s*\d+%\s*\d+/\d+\]' | tail -1)
            PCT=$(echo "$LINE" | grep -oP '\d+(?=%)')
            JOBS=$(echo "$LINE" | grep -oP '\d+/\d+' | tail -1)
            CPU=$(top -bn1 | grep "Cpu(s)" | awk '{print $2+$4"%"}')
            RAM=$(free -h | awk '/^Mem:/{printf "%s/%s", $3, $2}')
            SWAP=$(free -h | awk '/^Swap:/{printf "%s/%s", $3, $2}')
            DISK=$(df -h / | tail -1 | awk '{print $3"/"$2}')
            ELAPSED=$(( $(date +%s) - START_TS ))
            ELAPSED_FMT=$(printf '%dm %ds' $((ELAPSED/60)) $((ELAPSED%60)))
            MSG=$(printf "Build: %s%% (%s)\nTime:  %s\nCPU:   %s\nRAM:   %s\nSwap:  %s\nDisk:  %s" \
              "${PCT:-0}" "${JOBS:-?/?}" \
              "${ELAPSED_FMT}" \
              "${CPU}" "${RAM}" "${SWAP}" "${DISK}")
            if [[ -z "$MSG_ID" ]]; then
              RESP=$(curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d "chat_id=${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=${MSG}")
              MSG_ID=$(echo "$RESP" | grep -oP '"message_id":\K[0-9]+')
            else
              curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageText" \
                -d "chat_id=${TELEGRAM_CHAT_ID}" \
                -d "message_id=${MSG_ID}" \
                --data-urlencode "text=${MSG}" \
                -o /dev/null 2>&1
              LAST_PCT="$PCT"
            fi
          done
          wait $BUILD_PID

      - name: Free space after
        run: df -h /

      - name: Generate tag
        run: echo "RELEASE_TAG=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: inputs.release
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: Target: ${{ inputs.target }}
          files: out/target/product/*/*-RMX*.zip
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: ccache stats
        if: always()
        run: ccache -s -v

