name: Build AOSP Module

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git git-lfs gnupg gperf imagemagick protobuf-compiler python3-protobuf \
            lib32readline-dev lib32z1-dev libdw-dev libelf-dev libgnutls28-dev lz4 \
            libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync \
            schedtool squashfs-tools xsltproc xxd zip zlib1g-dev \
            lib32ncurses5-dev libncurses5 libncurses5-dev
          sudo apt-get install -y -qq python-is-python3

      - name: Install repo
        run: |
          sudo wget -q https://storage.googleapis.com/git-repo-downloads/repo -O /usr/local/bin/repo
          sudo chmod a+x /usr/local/bin/repo
          repo --version

      - name: Git config
        run: |
          git config --global user.name "ci"
          git config --global user.email "ci@ci.com"
          git lfs install
          git config --global trailer.changeid.key "Change-Id"

      - name: Repo init
        run: |
          repo init --depth=1 -u https://github.com/LineageOS/android.git -b lineage-18.1
          mkdir -p .repo/local_manifests
          cp local_manifest.xml .repo/local_manifests/

      - name: Repo sync
        run: |
          repo sync --force-sync -c --no-tags --optimized-fetch --prune -j$(nproc)

      - name: Setup vendor keys
        env:
          VENDOR_KEYS: ${{ secrets.VENDOR_KEYS }}
        run: |
          echo "$VENDOR_KEYS" | base64 -d > vendor_keys.zip
          unzip -o vendor_keys.zip
          rm -f vendor_keys.zip
          export OWN_KEYS_DIR="$PWD/vendor_keys"
          sudo ln -sf "$OWN_KEYS_DIR/releasekey.pk8" "$OWN_KEYS_DIR/testkey.pk8"
          sudo ln -sf "$OWN_KEYS_DIR/releasekey.x509.pem" "$OWN_KEYS_DIR/testkey.x509.pem"
          echo "OWN_KEYS_DIR=$OWN_KEYS_DIR" >> $GITHUB_ENV

      - name: Build
        run: |
          source build/envsetup.sh
          lunch lineage_RMX2185-userdebug
          make SystemUI -j$(nproc)

      - name: Free space after
        run: df -h /

      - name: Source size
        run: |
          du -sh --exclude=.git

